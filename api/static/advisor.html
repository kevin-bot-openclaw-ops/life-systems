<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Life Systems | Personal Life Strategy Advisor</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: #0f1419;
            color: #e7e9ea;
            line-height: 1.6;
            padding: 20px;
            max-width: 100%;
        }

        .container {
            max-width: 800px;
            margin: 0 auto;
        }

        header {
            margin-bottom: 30px;
            padding-bottom: 15px;
            border-bottom: 1px solid #2f3336;
        }

        h1 {
            font-size: 1.8rem;
            font-weight: 600;
            color: #1d9bf0;
            margin-bottom: 5px;
        }

        .tagline {
            color: #71767b;
            font-size: 0.9rem;
        }

        .section {
            background: #16181c;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .section.empty {
            border-color: #71767b;
            opacity: 0.7;
        }

        .goal-tag {
            font-size: 0.75rem;
            text-transform: uppercase;
            color: #1d9bf0;
            font-weight: 600;
            margin-bottom: 8px;
            letter-spacing: 0.5px;
        }

        .one-liner {
            font-size: 1.1rem;
            font-weight: 500;
            line-height: 1.4;
            margin-bottom: 15px;
            color: #e7e9ea;
        }

        .data-table {
            width: 100%;
            border-collapse: collapse;
            margin: 15px 0;
            font-size: 0.9rem;
        }

        .data-table th {
            background: #1c1f26;
            padding: 10px;
            text-align: left;
            font-weight: 600;
            border-bottom: 2px solid #2f3336;
            color: #71767b;
            font-size: 0.8rem;
            text-transform: uppercase;
        }

        .data-table td {
            padding: 10px;
            border-bottom: 1px solid #2f3336;
        }

        .data-table tr:last-child td {
            border-bottom: none;
        }

        .actions {
            margin-top: 15px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
        }

        .btn {
            padding: 10px 18px;
            border-radius: 8px;
            font-weight: 600;
            text-decoration: none;
            display: inline-block;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.2s;
        }

        .btn-primary {
            background: #1d9bf0;
            color: #0f1419;
        }

        .btn-primary:hover {
            background: #1a8cd8;
        }

        .btn-secondary {
            background: #2f3336;
            color: #e7e9ea;
        }

        .btn-secondary:hover {
            background: #3f4346;
        }

        .recommendations {
            background: #16181c;
            border: 1px solid #2f3336;
            border-radius: 12px;
            padding: 20px;
        }

        .recommendations h2 {
            font-size: 1.3rem;
            margin-bottom: 15px;
            color: #e7e9ea;
        }

        .recommendation {
            background: #1c1f26;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 12px;
            border-left: 3px solid #1d9bf0;
        }

        .recommendation:last-child {
            margin-bottom: 0;
        }

        .recommendation .priority {
            font-size: 0.7rem;
            color: #71767b;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .recommendation .text {
            margin-bottom: 10px;
            font-size: 0.95rem;
        }

        .timestamp {
            color: #71767b;
            font-size: 0.8rem;
            text-align: center;
            margin-top: 20px;
        }

        @media (max-width: 768px) {
            body {
                padding: 10px;
            }

            h1 {
                font-size: 1.5rem;
            }

            .section {
                padding: 15px;
            }

            .data-table {
                font-size: 0.8rem;
            }

            .data-table th, .data-table td {
                padding: 8px;
            }

            .btn {
                font-size: 0.85rem;
                padding: 8px 14px;
            }
        }

        .error {
            background: #f9186010;
            border: 1px solid #f91860;
            color: #f91860;
            padding: 15px;
            border-radius: 8px;
            margin: 20px 0;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>Life Systems</h1>
            <div class="tagline">Personal Life Strategy Advisor</div>
        </header>

        <div id="content">
            <p style="text-align: center; color: #71767b;">Loading...</p>
        </div>

        <div class="timestamp" id="timestamp"></div>
    </div>

    <script>
        async function loadAdvisor() {
            try {
                const response = await fetch('/api/dashboard');
                const data = await response.json();
                
                renderAdvisor(data);
            } catch (error) {
                console.error('Failed to load advisor:', error);
                document.getElementById('content').innerHTML = `
                    <div class="error">
                        Failed to load dashboard. Please try again or contact support.
                    </div>
                `;
            }
        }

        function renderAdvisor(data) {
            const { advisor, timestamp } = data;
            const container = document.getElementById('content');
            
            let html = '';

            // Dating section (GOAL-1)
            html += renderSection(advisor.dating);

            // Career section (GOAL-2)
            html += renderSection(advisor.career);

            // Location section (GOAL-3)
            html += renderSection(advisor.location);

            // Top recommendations
            if (advisor.recommendations && advisor.recommendations.length > 0) {
                html += '<div class="recommendations"><h2>Top Recommendations</h2>';
                advisor.recommendations.forEach(rec => {
                    html += `
                        <div class="recommendation">
                            <div class="priority">Priority ${rec.priority} | ${rec.goal}</div>
                            <div class="text">${rec.one_liner}</div>
                            ${renderAction(rec.action)}
                        </div>
                    `;
                });
                html += '</div>';
            }

            container.innerHTML = html;
            document.getElementById('timestamp').textContent = `Updated ${new Date(timestamp).toLocaleString()}`;
        }

        function renderSection(section) {
            if (!section) return '';

            const emptyClass = section.empty_state ? ' empty' : '';
            
            let html = `<div class="section${emptyClass}">`;
            
            // Goal tag
            if (section.goal) {
                html += `<div class="goal-tag">${section.goal}</div>`;
            }
            
            // One-liner
            html += `<div class="one-liner">${section.one_liner}</div>`;
            
            // Data table
            if (section.data_table && section.data_table.length > 0) {
                html += renderDataTable(section.data_table);
            }
            
            // Actions
            if (section.actions && section.actions.length > 0) {
                html += '<div class="actions">';
                section.actions.forEach(action => {
                    html += renderAction(action);
                });
                html += '</div>';
            }
            
            html += '</div>';
            return html;
        }

        function renderDataTable(rows) {
            if (rows.length === 0) return '';
            
            // Get column headers from first row
            const headers = Object.keys(rows[0]).filter(key => key !== 'id');
            
            let html = '<table class="data-table"><thead><tr>';
            headers.forEach(header => {
                html += `<th>${formatHeader(header)}</th>`;
            });
            html += '</tr></thead><tbody>';
            
            rows.forEach(row => {
                html += '<tr>';
                headers.forEach(header => {
                    html += `<td>${row[header]}</td>`;
                });
                html += '</tr>';
            });
            
            html += '</tbody></table>';
            return html;
        }

        function formatHeader(str) {
            return str
                .replace(/_/g, ' ')
                .replace(/\b\w/g, c => c.toUpperCase());
        }

        function renderAction(action) {
            const btnClass = action.type === 'primary' ? 'btn-primary' : 'btn-secondary';
            return `<a href="${action.href}" class="btn ${btnClass}">${action.label}</a>`;
        }

        // Load on page load
        loadAdvisor();
    </script>
</body>
</html>
